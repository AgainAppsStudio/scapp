<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mobile Installment Manager</title>
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="Manage mobile sales and installments efficiently." />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#4f46e5',
              secondary: '#10b981',
            }
          }
        }
      }
    </script>

    <!-- Import Maps -->
        <style>
      /* Custom scrollbar for a cleaner look */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      .dark ::-webkit-scrollbar-thumb { background: #475569; }
      
      /* Print styles */
      @media print {
        body { background: white; color: black; }
        .print-hidden { display: none !important; }
        .print-only { display: block !important; }
        .print-break-inside-avoid { break-inside: avoid; }
      }
      .print-only { display: none; }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-200 antialiased">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  <script type="module" src="/index.js"></script></body>
</html>
